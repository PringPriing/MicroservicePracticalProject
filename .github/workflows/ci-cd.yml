name: CI/CD

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'k8s/azure/**'
      - '.github/workflows/ci-cd.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - run: dotnet test tests/UserManagement/UserManagement.Application.Tests/UserManagement.Application.Tests.csproj
      - run: dotnet test tests/UserManagement/UserManagement.API.Tests/UserManagement.API.Tests.csproj
      - run: dotnet test tests/ProductCatalog/ProductCatalog.Application.Tests/ProductCatalog.Application.Tests.csproj
      - run: dotnet test tests/ProductCatalog/ProductCatalog.API.Tests/ProductCatalog.API.Tests.csproj

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: usermanagement-api
            dockerfile: src/UserManagement/UserManagement.API/Dockerfile
          - name: productcatalog-api
            dockerfile: src/ProductCatalog/ProductCatalog.API/Dockerfile
          - name: api-gateway
            dockerfile: src/ApiGateway/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: ACR login
        run: az acr login --name ${{ vars.ACR_NAME }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.name }}:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ vars.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ vars.AKS_CLUSTER_NAME }}
      - name: Update image tags
        run: |
          kubectl set image deployment/usermanagement-api usermanagement-api=${{ vars.ACR_LOGIN_SERVER }}/usermanagement-api:${{ github.sha }} -n ${{ vars.K8S_NAMESPACE }}
          kubectl set image deployment/productcatalog-api productcatalog-api=${{ vars.ACR_LOGIN_SERVER }}/productcatalog-api:${{ github.sha }} -n ${{ vars.K8S_NAMESPACE }}
          kubectl set image deployment/api-gateway api-gateway=${{ vars.ACR_LOGIN_SERVER }}/api-gateway:${{ github.sha }} -n ${{ vars.K8S_NAMESPACE }}
      - name: Verify rollout
        run: |
          kubectl rollout status deployment/usermanagement-api -n ${{ vars.K8S_NAMESPACE }} --timeout=180s
          kubectl rollout status deployment/productcatalog-api -n ${{ vars.K8S_NAMESPACE }} --timeout=180s
          kubectl rollout status deployment/api-gateway -n ${{ vars.K8S_NAMESPACE }} --timeout=180s
